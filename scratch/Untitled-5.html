<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExploreMate Title Slide</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Poppins:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #1a1a1a;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Using a high-quality travel/abstract image instead of CSS gradient */
            background-image: url("https://page.gensparksite.com/slides_images/8d9a2ece6a0d01ed30dd8ccc92a18fe4.webp");
            background-size: cover;
            background-position: center;
        }
        /* Solid color overlay to ensure text readability without using gradients */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85); 
            z-index: 1;
        }
        .content-wrapper {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .logo-container {
            margin-bottom: 2rem;
            animation: float 6s ease-in-out infinite;
        }
        .logo-icon {
            font-size: 5rem;
            color: #38bdf8;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            margin: 0;
            letter-spacing: -3px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .title-accent {
            color: #38bdf8; /* Sky blue accent */
        }
        .subtitle {
            font-size: 2rem;
            color: #e0f2fe;
            margin-top: 1rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-top: 1rem;
            font-weight: 400;
            max-width: 900px;
            padding: 0 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.3);
            padding-top: 20px;
        }
        .team-container {
            margin-top: 60px;
            background-color: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            padding: 25px 50px;
            border-radius: 100px; /* Pill shape */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .team-title {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
            display: block;
        }
        .team-grid {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .team-member {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .team-member i {
            color: #38bdf8;
            font-size: 0.8rem;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        /* Decorative circle to simulate gradient glow */
        .glow-effect {
            position: absolute;
            width: 600px;
            height: 600px;
            background-color: #3b82f6;
            filter: blur(150px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Overlay -->
<div class="overlay"></div>
<!-- Center Glow Simulation -->
<div class="glow-effect"></div>
<div class="content-wrapper">
<!-- Animated Icon -->
<div class="logo-container">
<i class="fa-solid fa-earth-americas logo-icon"></i>
</div>
<!-- Main Title -->
<h1>Explore<span class="title-accent">Mate</span></h1>
<!-- Subtitle -->
<p class="subtitle">Your AI-Powered Travel Companion</p>
<!-- Tagline -->
<p class="tagline">Reimagining Travel Through AI, Personalization &amp; Gamification</p>
<!-- Team Section -->
<div class="team-container">
<div class="team-grid">
<div class="team-member"><i class="fa-solid fa-code"></i> P.S.S. Nehah</div>
<div class="team-member"><i class="fa-solid fa-code"></i> J. Devasish Venkat Sai</div>
<div class="team-member"><i class="fa-solid fa-code"></i> P. Pavan Sai Harshith</div>
<div class="team-member"><i class="fa-solid fa-code"></i> Matta Karthikeya</div>
<div class="team-member"><i class="fa-solid fa-code"></i> Sawant Trishali</div>
</div>
</div>
</div>
</div>
</body>
</html>
