name: thunder_thursday_app
description: Thunder Thursday Event App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.0
  carousel_slider: ^5.0.0
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/thunder_thursday_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/
    - assets/images/event_images/
